  <link rel="apple-touch-icon" href="icons/icon-192x192.png" sizes="192x192" type="image/png" />
  <link rel="apple-touch-icon" href="icons/icon-384x384.png" sizes="384x384" type="image/png" />
  <link rel="apple-touch-icon" href="icons/icon-512x512.png" sizes="512x512" type="image/png" />

  <meta name="theme-color" content="#000" />

  <style>
    html {
      background: #444;
      font-family: sans-serif;
    }

    body, html {
      overscroll-behavior: none;
    }

    #canvas, #overlayDiv {
      position: absolute;
      top: 0px;
      left: 0px;

      width: 100%;
      height: 100%;

      border: 0 none;
    }

    #canvas {
      background: #000;
    }

    .visible {
      visibility: visible;
      opacity: 1.0;
      transition: opacity .1s linear;
    }

    .hidden {
      visibility: hidden;
      opacity: 0;
      transition: visibility 0s .25s, opacity .25s linear;
    }

    #statusDiv, #inputDiv {
      background: rgba(0, 0, 0, 0.75);
      width: 50%;
      margin: auto;
      min-width: 340px;
      padding: 10px;

      position: absolute;
      top: 0;
      left: 0;
      right: 0;

      border-radius: 0 0 5px 5px;
    }

    #statusTextDiv {
      overflow: auto;
      max-height: 40vh;
      color: #ccc;
      font-size: 14px;
    }

    #statusProgress {
      display: none;
      width: 100%;
    }

    #inputDiv {
      width: 65%;
      padding-left: 10px;
      padding-right: 20px;
    }

    #inputPrompt {
      color: #eee;
      font-size: 150%;
      margin-bottom: 1em;
      margin-top: 1em;

    }

    #inputText {
      width: 100%;
      font-size: 175%;
      padding: 5px;
      background: inherit;
      color: #eee;
    }

    #inputText:focus {
      color: #ffffff;
    }

    #ContextContainer {
      position: absolute;
      left: 0px;
      top: 0px;
      color: white;
    }

    #ContextContainer.shown {
      background: rgba(0, 0, 0, 0.5);
      border-radius: 0px 0px 5px 0px;
    }

    #ContextButton {
      text-decoration: none;
      color: lightgrey;
      font-size: xx-large;
      cursor: pointer;
      user-select: none;
      -moz-user-select: none;
      padding: 10px 10px;
      opacity: .75;
    }

    #ContextButton:focus {
      outline: none;
      color: #ffffff;
      opacity: 1.0;
    }

    #ContextMenu a {
      text-decoration: none;
      color: lightgrey;
      background: #444;
      height: 48px;
      width: 250px;
      border-radius: 5px;
      border: 1px solid lightgrey;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 5px 5px;
      opacity: 1.0;
    }

    #ContextMenu a:hover {
      text-decoration: none;
      background: #666666;
      color: #ffffff
    }

    #presplash {
        position: absolute;
        top: 0;
        left: 0;
        display: block;
        margin: auto;
        width: 100%;
        height: 100%;
        object-fit: contain;
    }

#presplash {
    display: none;
}

#custom-loading {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}

#custom-loading p {
    color: #cc0000;
    font-size: 32px;
    font-family: 'Zen Antique', serif;
    letter-spacing: 4px;
}

#next-games-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    z-index: 99999;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    font-family: 'Zen Antique', serif;
    color: #fff;
}
#next-games-overlay.visible {
    display: flex;
}
#next-games-panel {
    background: #1a1a1a;
    padding: 30px 40px;
    border-radius: 16px;
    max-width: 90%;
    max-height: 90vh;
    overflow-y: auto;
    text-align: center;
    box-shadow: 0 8px 32px rgba(255, 0, 0, 0.3);
}
#next-games-panel h2 {
    color: #cc0000;
    font-size: 28px;
    margin-bottom: 16px;
    letter-spacing: 4px;
}
#next-games-tagline {
    margin: 12px 0 20px;
    font-size: 16px;
    color: #eee;
}
#next-games-slider {
    position: relative;
    width: 400px;
    max-width: 100%;
    height: 250px;
    margin: 20px auto;
    overflow: hidden;
    border-radius: 8px;
    background: #333;
}
#next-games-slider img {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 0.8s ease-in-out;
}
#next-games-slider img.active {
    opacity: 1;
}
#next-games-line-button {
    display: inline-block;
    margin-top: 20px;
    padding: 16px 40px;
    background: #06c755;
    color: #fff;
    text-decoration: none;
    border-radius: 999px;
    font-size: 18px;
    font-weight: bold;
    transition: transform 0.2s, box-shadow 0.2s;
}
#next-games-line-button:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(6, 199, 85, 0.5);
}
#next-games-close {
    display: block;
    margin: 16px auto 0;
    padding: 8px 24px;
    background: transparent;
    color: #aaa;
    border: 1px solid #555;
    border-radius: 999px;
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
}
#next-games-close:hover {
    color: #fff;
    border-color: #888;
}
  </style>

</head>

<body>
  <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex=-1></canvas>
  <div id="overlayDiv"></div>

  <img id="presplash" src="web-presplash.jpg">
  <div id="custom-loading">
    <p>Loading...</p>
  </div>

  <div id="ContextContainer">
    <a id="ContextButton">&#8801;</a><br />
    <div id="ContextMenu" style="display: none;">
      <input id="ID_SavegamesImport" type="file" onchange="onSavegamesImport(this)" accept="application/zip"
        style=display:none></input>
      <a href="javascript:document.getElementById('ID_SavegamesImport').click();">Import Saves</a>
      <a href="javascript:onSavegamesExport();">Export Saves</a>
      <a href="javascript:FSDownload('/log.txt', 'text/plain');">Download Log</a>
      <a href="https://www.renpy.org/" target="_blank">
          Powered by Ren'Py
      </a>
      </span>
    </div>
  </div>

  <div id="statusDiv" class="hidden">
    <div id="statusTextDiv"></div>
    <progress id="statusProgress" value="0" max="100"></progress>
  </div>

  <div id="inputDiv" class="hidden">
    <form id="inputForm">
      <div id="inputPrompt"></div>
      <input id="inputText" type="text">
    </form>
  </div>

  <script>
      // The URL to game.zip, relative to the URL of this file.
      window.gameZipURL = 'game.zip';

      // Register the service worker.
      if (navigator.serviceWorker) {
          if (!navigator.serviceWorker.controller) {
              navigator.serviceWorker.register('./service-worker.js', { updateViaCache: 'all' });
          }
      }
      window.addEventListener('load', function() {
          setTimeout(function() {
              var el = document.getElementById('custom-loading');
              if (el) el.style.display = 'none';
          }, 3000);
      });
  </script>
  <script src="renpy-pre.js"></script>
  <script async type="text/javascript" src="renpy.js"></script>
<div id="next-games-overlay">
  <div id="next-games-panel">
    <h2>遊んでくれてありがとう!</h2>
    <p id="next-games-tagline">他のゲームも遊べます🎮</p>
    <div id="next-games-slider">
      <img src="thumbnails/game_1.png" alt="ゲーム1" class="active">
      <img src="thumbnails/game_2.png" alt="ゲーム2">
      <img src="thumbnails/game_3.png" alt="ゲーム3">
    </div>
    <a id="next-games-line-button" 
       href="https://line.me/R/ti/p/@DUMMY_LINE_ID"
       target="_blank">
       LINEで友だち追加
    </a>
    <button id="next-games-close" onclick="hideNextGamesPanel()">
      閉じる
    </button>
  </div>
</div>

<script>
(function() {
  var slideIndex = 0;
  var slideTimer = null;
  
  function startSlideshow() {
    var slides = document.querySelectorAll('#next-games-slider img');
    if (slides.length === 0) return;
    
    slideTimer = setInterval(function() {
      slides[slideIndex].classList.remove('active');
      slideIndex = (slideIndex + 1) % slides.length;
      slides[slideIndex].classList.add('active');
    }, 3000);
  }
  
  function stopSlideshow() {
    if (slideTimer) {
      clearInterval(slideTimer);
      slideTimer = null;
    }
  }
  
  window.showNextGamesPanel = function(ending) {
    var overlay = document.getElementById('next-games-overlay');
    if (!overlay) return;
    overlay.classList.add('visible');
    startSlideshow();
    
    if (window.console && console.debug) {
      console.debug('[next_games_panel] shown', ending);
    }
  };
  
  window.hideNextGamesPanel = function() {
    var overlay = document.getElementById('next-games-overlay');
    if (!overlay) return;
    overlay.classList.remove('visible');
    stopSlideshow();
  };
})();
</script>
</body>

</html>
