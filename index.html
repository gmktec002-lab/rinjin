  <style>
    html {

      font-family: sans-serif;
    }

    body, html {

    }

    #canvas, #overlayDiv {
      position: absolute;
      top: 0px;
      left: 0px;

      height: 100%;

    }

    #canvas {
      background: #000;
    }

    .visible {

      opacity: 1.0;
      transition: opacity .1s linear;
    }

    .hidden {
      visibility: hidden;
      opacity: 0;
      transition: visibility 0s .25s, opacity .25s linear;
    }

    #statusDiv, #inputDiv {
      background: rgba(0, 0, 0, 0.75);
      width: 50%;
      margin: auto;
      min-width: 340px;
      padding: 10px;

      position: absolute;
      top: 0;
      left: 0;
      right: 0;

      border-radius: 0 0 5px 5px;
    }

    #statusTextDiv {
      overflow: auto;
      max-height: 40vh;
      color: #ccc;
      font-size: 14px;
    }

    #statusProgress {
      display: none;
      width: 100%;
    }

    #inputDiv {
      width: 65%;
      padding-left: 10px;
      padding-right: 20px;
    }

    #inputPrompt {
      color: #eee;
      font-size: 150%;
      margin-bottom: 1em;
      margin-top: 1em;

    }

    #inputText {
      width: 100%;
      font-size: 175%;
      padding: 5px;
      background: inherit;
      color: #eee;
    }

    #inputText:focus {

    }

      left: 0px;
      top: 0px;
      color: white;
    }

    }

    #ContextMenu a:hover {

    }

    #presplash {

        top: 0;

        display: block;

#presplash {
    display: none;
}

#custom-loading {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}

#custom-loading p {
    color: #cc0000;
    font-size: 32px;
    font-family: 'Zen Antique', serif;
    letter-spacing: 4px;
}

#next-games-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.85);
    z-index: 99999;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    font-family: 'Zen Antique', serif;
    color: #fff;
}
#next-games-overlay.visible {
    display: flex;
}
#next-games-panel {
    background: #1a1a1a;
    padding: 40px 50px;
    border-radius: 16px;
    width: 80%;
    max-width: 1100px;
    max-height: 85vh;
    overflow-y: auto;
    text-align: center;
    box-shadow: 0 8px 32px rgba(255, 0, 0, 0.3);
    box-sizing: border-box;
}
#next-games-panel h2 {
    color: #cc0000;
    font-size: 32px;
    margin-bottom: 16px;
    letter-spacing: 4px;
}
#next-games-tagline {
    margin: 12px 0 30px;
    font-size: 18px;
    color: #eee;
    line-height: 1.6;
}

/* カルーセル(3枚横並び+スクロール) */
#next-games-carousel-wrapper {
    position: relative;
    width: 100%;
    overflow: hidden;
    margin: 30px 0;
    padding: 10px 0;
}
#next-games-carousel-track {
    display: flex;
    gap: 20px;
    transition: transform 0.6s ease-in-out;
    will-change: transform;
}
.next-games-card {
    flex: 0 0 calc((100% - 40px) / 3);
    aspect-ratio: 800 / 500;
    border-radius: 12px;
    overflow: hidden;
    background: #333;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.5);
}
.next-games-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}

#next-games-line-button {
    display: inline-block;
    margin-top: 30px;
    padding: 18px 50px;
    background: #06c755;
    color: #fff;
    text-decoration: none;
    border-radius: 999px;
    font-size: 20px;
    font-weight: bold;
    transition: transform 0.2s, box-shadow 0.2s;
}
#next-games-line-button:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(6, 199, 85, 0.5);
}
#next-games-close {
    display: block;
    margin: 20px auto 0;
    padding: 8px 28px;
    background: transparent;
    color: #aaa;
    border: 1px solid #555;
    border-radius: 999px;
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
}
#next-games-close:hover {
    color: #fff;
    border-color: #888;
}

/* スマホ対応 */
@media (max-width: 768px) {
    #next-games-panel {
        width: 92%;
        padding: 30px 20px;
    }
    #next-games-panel h2 {
        font-size: 24px;
    }
    #next-games-tagline {
        font-size: 14px;
    }
    .next-games-card {
        flex: 0 0 calc((100% - 20px) / 2);
    }
    #next-games-line-button {
        padding: 14px 32px;
        font-size: 16px;
    }
}

#entry-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.92);
    z-index: 99998;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    font-family: 'Zen Antique', serif;
    color: #fff;
}
#entry-overlay.visible {
    display: flex;
}
#entry-panel {
    background: #1a1a1a;
    padding: 50px 60px;
    border-radius: 16px;
    width: 80%;
    max-width: 600px;
    text-align: center;
    box-shadow: 0 8px 32px rgba(255, 0, 0, 0.4);
    box-sizing: border-box;
}
#entry-title {
    color: #cc0000;

    font-weight: bold;

    margin: 0 0 16px;

}
#entry-subtitle {

    font-size: 18px;

    letter-spacing: 2px;
}
.entry-button {
    display: block;
    width: 100%;
    padding: 18px 30px;
    margin: 12px 0;
    border-radius: 999px;
    font-size: 18px;
    font-weight: bold;
    text-decoration: none;
    text-align: center;
    cursor: pointer;
    border: none;
    font-family: inherit;

.entry-button:hover {

.entry-button-play {

.entry-button-line {

@media (max-width: 768px) {

    #entry-title {

    }

    }
    .entry-button {
        font-size: 16px;
        padding: 16px 20px;

<body>

<div id="next-games-overlay">
  <div id="next-games-panel">
    <h2>遊んでいただきありがとうございました!</h2>
    <p id="next-games-tagline">下のボタンからLINE追加で、他のゲームも遊べます!</p>

        <div class="next-games-card"><img src="thumbnails/game_2.png" alt="ゲーム2"></div>

    </a>
    <button id="next-games-close" onclick="hideNextGamesPanel()">
      閉じる
    </button>

</div>

<script>
(function() {
  var carouselIndex = 0;
  var carouselTimer = null;
  var totalOriginal = 6;  // 元画像の枚数
  
  function startCarousel() {
    var track = document.getElementById('next-games-carousel-track');
    if (!track) return;
    
    // 初期位置リセット
    carouselIndex = 0;
    track.style.transition = 'none';
    track.style.transform = 'translateX(0)';
    
    // 強制リフロー
    void track.offsetWidth;
    track.style.transition = 'transform 0.6s ease-in-out';
    
    if (carouselTimer) clearInterval(carouselTimer);
    
    carouselTimer = setInterval(function() {
      var wrapper = document.getElementById('next-games-carousel-wrapper');
      if (!wrapper) return;
      
      var cards = track.querySelectorAll('.next-games-card');
      if (cards.length === 0) return;
      
      var cardWidth = cards[0].offsetWidth;
      var gap = 20;
      var step = cardWidth + gap;
      
      carouselIndex++;
      track.style.transition = 'transform 0.6s ease-in-out';
      track.style.transform = 'translateX(-' + (step * carouselIndex) + 'px)';
      
      // 元画像の最後まで来たら、瞬時に最初に戻す(無限ループ風)
      if (carouselIndex >= totalOriginal) {
        setTimeout(function() {
          track.style.transition = 'none';
          carouselIndex = 0;
          track.style.transform = 'translateX(0)';
        }, 600);
      }
    }, 3000);
  }
  
  function stopCarousel() {
    if (carouselTimer) {
      clearInterval(carouselTimer);
      carouselTimer = null;
    }
  }
  
  window.showNextGamesPanel = function(ending) {
    var overlay = document.getElementById('next-games-overlay');
    if (!overlay) return;
    overlay.classList.add('visible');
    
    // 少し待ってからカルーセル開始(レイアウト確定後)
    setTimeout(startCarousel, 100);
    
    if (window.console && console.debug) {
      console.debug('[next_games_panel] shown', ending);
    }
  };
  
  window.hideNextGamesPanel = function() {
    var overlay = document.getElementById('next-games-overlay');
    if (!overlay) return;
    overlay.classList.remove('visible');
    stopCarousel();
  };
})();
</script>

<div id="entry-overlay">

<script>
(function() {
  // カスタムローディング消滅後、entry-overlay を表示
  window.addEventListener('load', function() {
    setTimeout(function() {
      var entry = document.getElementById('entry-overlay');
      if (entry) {
        entry.classList.add('visible');
      }
    }, 3100);  // カスタムローディング(3000ms)の直後
  });
  
  window.startGameNow = function() {
    var entry = document.getElementById('entry-overlay');
    if (entry) {
      entry.classList.remove('visible');
    }
    
    if (window.console && console.debug) {
      console.debug('[entry] start_now clicked');
    }
  };
})();
</script>
